- name: Install Packages
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  loop:
  - python3 
  - gcc
  - python3-devel

- name: nodejs setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: Install package.
  ansible.builtin.command: pip3 install -r requirements.txt
  args:
    chdir: /app

- name: nodejs setup
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd-restart.yaml

- name: Deamon Reload
  ansible.builtin.systemd_service:
    daemon_reload: true
