- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: nodejs-setup.yaml

- name: nodejs setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: start {{ component }}
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd-restart.yaml
  
- name: Deamon Reload
  ansible.builtin.systemd_service:
    daemon_reload: true