- name: Copy {{ component }}.service file
  ansible.builtin.template:
    src: "{{ component }}.service.j2"
    dest: /etc/systemd/system/{{ component }}.service
    remote_src: true
  ignore_errors: true

- name: start {{ component }}
  ansible.builtin.service:
    state: restarted
    name: "{{ component }}"
    enabled: yes