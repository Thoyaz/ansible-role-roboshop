- name: Copy {{ component }}.service file
  ansible.builtin.template:
    src: "{{ component }}.service.j2"
    dest: /etc/systemd/system/{{ component }}.service
    remote_src: true
  when:
  - component == "catalogue"
  - component == "user"
  - component == "cart"
  - component == "shipping"
  - component == "payment"

- name: start {{ component }}
  ansible.builtin.service:
    state: restarted
    name: "{{ component }}"
    enabled: yes